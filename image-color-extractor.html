<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Image Color Extractor - Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #0f766e 100%);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        body.dark-mode .card {
            background: #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #1E3A8A;
            font-size: 24px;
        }

        body.dark-mode h1 {
            color: #0D9488;
        }

        .sub {
            color: #0D9488;
            font-size: 12px;
            font-weight: 500;
        }

        body.dark-mode .sub {
            color: #5eead4;
        }

        .dark-toggle {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .dark-toggle {
            background: #334155;
            color: white;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #0D9488;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            background: #f8fafc;
        }

        body.dark-mode .upload-area {
            background: #334155;
            border-color: #5eead4;
        }

        .upload-area:hover {
            background: #f0fdf4;
            border-color: #1E3A8A;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: #1E3A8A;
            font-weight: 500;
        }

        body.dark-mode .upload-text {
            color: #5eead4;
        }

        .upload-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }

        /* Image Preview */
        .image-preview {
            display: none;
            margin-bottom: 24px;
        }

        .image-preview.show {
            display: block;
        }

        .preview-img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Colors Grid */
        .colors-section {
            display: none;
            margin-top: 24px;
        }

        .colors-section.show {
            display: block;
        }

        .colors-title {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 16px;
            font-size: 16px;
        }

        body.dark-mode .colors-title {
            color: #5eead4;
        }

        .colors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }

        .color-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-card:active {
            transform: scale(0.98);
        }

        body.dark-mode .color-card {
            background: #0f172a;
        }

        .color-swatch {
            height: 80px;
        }

        .color-info {
            padding: 12px;
            text-align: center;
        }

        .color-hex {
            font-size: 14px;
            font-weight: bold;
            font-family: monospace;
            color: #1E3A8A;
        }

        body.dark-mode .color-hex {
            color: #5eead4;
        }

        .color-rgb {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            background: #0D9488;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .action-btn.clear {
            background: #dc2626;
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
        }

        body.dark-mode .info-text {
            background: #0f766e;
            color: #ccfbf1;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loader.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #0D9488;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 700px; margin: 0 auto; }
            .colors-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div>
                    <h1>🖼️ Image Color Extractor</h1>
                    <p class="sub">Upload any image and extract colors</p>
                </div>
                <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
            </div>

            <!-- Upload Area -->
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Click to upload an image</div>
                <div class="upload-hint">PNG, JPG, JPEG, WEBP (Max 5MB)</div>
                <input type="file" id="fileInput" accept="image/*" style="display: none" onchange="handleImageUpload(event)">
            </div>

            <!-- Loader -->
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #1E3A8A;">Extracting colors...</p>
            </div>

            <!-- Image Preview -->
            <div class="image-preview" id="imagePreview">
                <img id="previewImg" class="preview-img" alt="Preview">
            </div>

            <!-- Extracted Colors -->
            <div class="colors-section" id="colorsSection">
                <div class="colors-title">🎨 Extracted Colors (Click to copy)</div>
                <div class="colors-grid" id="colorsGrid"></div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn clear" onclick="clearAll()">🗑️ Clear All</button>
                <button class="action-btn" onclick="copyAllColors()">📋 Copy All Colors</button>
            </div>

            <div class="info-text">
                💡 Click on any color to copy HEX code • Works best with clear, colorful images
            </div>
        </div>
    </div>

    <script>
        let currentColors = [];

        function handleImageUpload(event) {
            let file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showFeedback('Please upload an image file!', '#dc2626');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                showFeedback('Image too large! Max 5MB', '#dc2626');
                return;
            }

            let reader = new FileReader();
            reader.onload = function(e) {
                let img = document.getElementById('previewImg');
                img.src = e.target.result;
                document.getElementById('imagePreview').classList.add('show');
                
                // Extract colors
                extractColors(img);
            };
            reader.readAsDataURL(file);
        }

        function extractColors(imgElement) {
            document.getElementById('loader').classList.add('show');
            document.getElementById('colorsSection').classList.remove('show');
            
            // Wait for image to load
            imgElement.onload = function() {
                let canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                
                // Reduce image size for faster processing
                let maxSize = 200;
                let width = imgElement.width;
                let height = imgElement.height;
                
                if (width > height) {
                    if (width > maxSize) {
                        height = (height * maxSize) / width;
                        width = maxSize;
                    }
                } else {
                    if (height > maxSize) {
                        width = (width * maxSize) / height;
                        height = maxSize;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(imgElement, 0, 0, width, height);
                
                let imageData = ctx.getImageData(0, 0, width, height);
                let pixels = imageData.data;
                
                // Sample pixels (step to reduce processing)
                let step = 5;
                let colorMap = new Map();
                
                for (let i = 0; i < pixels.length; i += step * 4) {
                    let r = pixels[i];
                    let g = pixels[i + 1];
                    let b = pixels[i + 2];
                    
                    // Round to nearest 10 for better grouping
                    r = Math.round(r / 10) * 10;
                    g = Math.round(g / 10) * 10;
                    b = Math.round(b / 10) * 10;
                    
                    let hex = rgbToHex(r, g, b);
                    let count = colorMap.get(hex) || 0;
                    colorMap.set(hex, count + 1);
                }
                
                // Sort by count and get top 6 colors
                let sortedColors = Array.from(colorMap.entries())
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 6)
                    .map(entry => entry[0]);
                
                currentColors = sortedColors;
                displayColors(currentColors);
                
                document.getElementById('loader').classList.remove('show');
                document.getElementById('colorsSection').classList.add('show');
            };
        }

        function rgbToHex(r, g, b) {
            return '#' + Math.round(r).toString(16).padStart(2,'0') + 
                         Math.round(g).toString(16).padStart(2,'0') + 
                         Math.round(b).toString(16).padStart(2,'0');
        }

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1,3), 16);
            let g = parseInt(hex.slice(3,5), 16);
            let b = parseInt(hex.slice(5,7), 16);
            return { r, g, b };
        }

        function displayColors(colors) {
            let container = document.getElementById('colorsGrid');
            container.innerHTML = '';
            
            colors.forEach(color => {
                let rgb = hexToRgb(color);
                let div = document.createElement('div');
                div.className = 'color-card';
                div.onclick = () => copyColor(color);
                div.innerHTML = `
                    <div class="color-swatch" style="background-color: ${color}"></div>
                    <div class="color-info">
                        <div class="color-hex">${color.toUpperCase()}</div>
                        <div class="color-rgb">rgb(${rgb.r}, ${rgb.g}, ${rgb.b})</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function copyColor(color) {
            navigator.clipboard.writeText(color.toUpperCase());
            showFeedback('✅ Copied: ' + color.toUpperCase(), color);
        }

        function copyAllColors() {
            if (currentColors.length === 0) {
                showFeedback('No colors to copy! Upload an image first.', '#dc2626');
                return;
            }
            let allColors = currentColors.map(c => c.toUpperCase()).join(' | ');
            navigator.clipboard.writeText(allColors);
            showFeedback('✅ Copied all ' + currentColors.length + ' colors!', '#0D9488');
        }

        function clearAll() {
            document.getElementById('fileInput').value = '';
            document.getElementById('imagePreview').classList.remove('show');
            document.getElementById('colorsSection').classList.remove('show');
            document.getElementById('previewImg').src = '';
            currentColors = [];
            showFeedback('🗑️ All cleared!', '#dc2626');
        }

        function showFeedback(msg, bgColor) {
            let feedback = document.createElement('div');
            feedback.innerText = msg;
            feedback.style.position = 'fixed';
            feedback.style.bottom = '30px';
            feedback.style.left = '50%';
            feedback.style.transform = 'translateX(-50%)';
            feedback.style.backgroundColor = bgColor;
            feedback.style.color = 'white';
            feedback.style.padding = '12px 24px';
            feedback.style.borderRadius = '50px';
            feedback.style.fontSize = '14px';
            feedback.style.zIndex = '1000';
            feedback.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
            document.body.appendChild(feedback);
            setTimeout(() => { feedback.remove(); }, 2000);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            let btn = document.querySelector('.dark-toggle');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = '☀️ Light Mode';
                localStorage.setItem('darkMode', 'enabled');
            } else {
                btn.innerHTML = '🌙 Dark Mode';
                localStorage.setItem('darkMode', 'disabled');
            }
        }

        function loadDarkMode() {
            let darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.body.classList.add('dark-mode');
                document.querySelector('.dark-toggle').innerHTML = '☀️ Light Mode';
            }
        }

        window.onload = () => {
            loadDarkMode();
        };
    </script>
</body>
</html>
