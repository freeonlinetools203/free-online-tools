<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Image Cropper - Crop Images Online | Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #0f766e 100%);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            text-align: center;
        }

        body.dark-mode .card {
            background: #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #1E3A8A;
            font-size: 24px;
        }

        body.dark-mode h1 {
            color: #0D9488;
        }

        .sub {
            color: #0D9488;
            font-size: 12px;
            font-weight: 500;
        }

        body.dark-mode .sub {
            color: #5eead4;
        }

        .dark-toggle {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .dark-toggle {
            background: #334155;
            color: white;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #0D9488;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            background: #f8fafc;
        }

        body.dark-mode .upload-area {
            background: #334155;
            border-color: #5eead4;
        }

        .upload-area:hover {
            background: #f0fdf4;
            border-color: #1E3A8A;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: #1E3A8A;
            font-weight: 500;
        }

        body.dark-mode .upload-text {
            color: #5eead4;
        }

        .upload-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }

        /* Cropper Container */
        .cropper-container {
            display: none;
            margin-top: 24px;
        }

        .cropper-container.show {
            display: block;
        }

        .canvas-wrapper {
            position: relative;
            background: #f8fafc;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 20px;
            overflow: auto;
            max-height: 60vh;
            text-align: center;
        }

        body.dark-mode .canvas-wrapper {
            background: #334155;
        }

        #imageCanvas {
            max-width: 100%;
            display: block;
            margin: 0 auto;
            cursor: crosshair;
        }

        /* Crop Overlay */
        .crop-overlay {
            position: absolute;
            border: 2px solid #0D9488;
            background: rgba(13, 148, 136, 0.2);
            cursor: move;
            display: none;
        }

        .crop-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border: 2px solid #0D9488;
            border-radius: 2px;
            z-index: 10;
        }

        /* Aspect Ratio Presets */
        .aspect-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        body.dark-mode .aspect-section {
            background: #334155;
        }

        .aspect-title {
            font-weight: 700;
            color: #1E3A8A;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: left;
        }

        body.dark-mode .aspect-title {
            color: #5eead4;
        }

        .aspect-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .aspect-btn {
            background: #e2e8f0;
            border: none;
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            color: #1E3A8A;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .aspect-btn {
            background: #475569;
            color: #5eead4;
        }

        .aspect-btn.active {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            color: white;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            background: #0D9488;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn.crop {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
        }

        .action-btn.download {
            background: #22c55e;
        }

        .action-btn.clear {
            background: #dc2626;
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
        }

        body.dark-mode .info-text {
            background: #0f766e;
            color: #ccfbf1;
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 800px; margin: 0 auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div><h1>✂️ Image Cropper</h1><p class="sub">Drag to select crop area • Adjust aspect ratio</p></div>
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>

        <!-- Upload Area -->
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">Click to upload an image</div>
            <div class="upload-hint">PNG, JPG, JPEG, WEBP (Max 10MB)</div>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
        </div>

        <!-- Cropper UI -->
        <div class="cropper-container" id="cropperContainer">
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="imageCanvas"></canvas>
            </div>

            <div class="aspect-section">
                <div class="aspect-title">📐 Aspect Ratio Presets</div>
                <div class="aspect-buttons">
                    <button class="aspect-btn active" data-ratio="free">Free</button>
                    <button class="aspect-btn" data-ratio="1:1">1:1 (Square)</button>
                    <button class="aspect-btn" data-ratio="4:3">4:3 (Photo)</button>
                    <button class="aspect-btn" data-ratio="16:9">16:9 (Widescreen)</button>
                    <button class="aspect-btn" data-ratio="3:2">3:2 (DSLR)</button>
                    <button class="aspect-btn" data-ratio="2:3">2:3 (Portrait)</button>
                    <button class="aspect-btn" data-ratio="9:16">9:16 (Story)</button>
                </div>
            </div>

            <div class="action-buttons">
                <button class="action-btn crop" id="applyCropBtn">✂️ Apply Crop</button>
                <button class="action-btn download" id="downloadBtn" style="display:none;">⬇️ Download Cropped Image</button>
                <button class="action-btn clear" onclick="clearAll()">🗑️ Clear All</button>
            </div>
        </div>

        <div class="info-text">
            💡 Upload image → Select aspect ratio → Drag to select crop area → Apply Crop → Download!
        </div>
    </div>
</div>

<script>
    let originalImage = null;
    let canvas = document.getElementById('imageCanvas');
    let ctx = canvas.getContext('2d');
    let img = new Image();
    let isDrawing = false;
    let startX = 0, startY = 0;
    let cropRect = { x: 0, y: 0, w: 0, h: 0 };
    let currentAspect = null; // null = free
    let imageWidth = 0, imageHeight = 0;
    let displayScale = 1;
    let croppedBlob = null;
    let originalFile = null;

    // Canvas wrapper for mouse coordinates
    const wrapper = document.getElementById('canvasWrapper');

    function handleImageUpload(event) {
        let file = event.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            showToast('Please upload an image file!', '#dc2626');
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            showToast('Image too large! Max 10MB', '#dc2626');
            return;
        }
        originalFile = file;
        let reader = new FileReader();
        reader.onload = function(e) {
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    img.onload = function() {
        imageWidth = img.width;
        imageHeight = img.height;
        // Set canvas size to fit in wrapper (max 100% width, maintain aspect)
        let maxWidth = wrapper.clientWidth - 20;
        let scale = Math.min(1, maxWidth / imageWidth);
        displayScale = scale;
        canvas.width = imageWidth * scale;
        canvas.height = imageHeight * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        // Reset crop rectangle to default (center 80% of image)
        let cropW = canvas.width * 0.8;
        let cropH = canvas.height * 0.8;
        cropRect = {
            x: (canvas.width - cropW) / 2,
            y: (canvas.height - cropH) / 2,
            w: cropW,
            h: cropH
        };
        drawCropOverlay();
        document.getElementById('cropperContainer').classList.add('show');
        document.getElementById('downloadBtn').style.display = 'none';
        croppedBlob = null;
        showToast('Image loaded! Drag to select crop area.', '#0D9488');
    };

    function drawCropOverlay() {
        // Redraw image
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        // Draw semi-transparent overlay outside crop area
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.clearRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
        ctx.strokeStyle = '#0D9488';
        ctx.lineWidth = 2;
        ctx.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
        // Draw handles (small squares at corners)
        ctx.fillStyle = 'white';
        let handleSize = 8;
        let corners = [
            [cropRect.x - handleSize/2, cropRect.y - handleSize/2],
            [cropRect.x + cropRect.w - handleSize/2, cropRect.y - handleSize/2],
            [cropRect.x - handleSize/2, cropRect.y + cropRect.h - handleSize/2],
            [cropRect.x + cropRect.w - handleSize/2, cropRect.y + cropRect.h - handleSize/2]
        ];
        corners.forEach(pos => {
            ctx.fillRect(pos[0], pos[1], handleSize, handleSize);
        });
    }

    // Mouse events for dragging crop area
    let isDraggingCrop = false;
    let dragStartX = 0, dragStartY = 0;

    canvas.addEventListener('mousedown', (e) => {
        let rect = canvas.getBoundingClientRect();
        let mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        let mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        // Check if click inside crop area for moving
        if (mouseX >= cropRect.x && mouseX <= cropRect.x + cropRect.w &&
            mouseY >= cropRect.y && mouseY <= cropRect.y + cropRect.h) {
            isDraggingCrop = true;
            dragStartX = mouseX - cropRect.x;
            dragStartY = mouseY - cropRect.y;
            canvas.style.cursor = 'grabbing';
            e.preventDefault();
        } else {
            // Start drawing new crop rectangle
            isDrawing = true;
            startX = mouseX;
            startY = mouseY;
            canvas.style.cursor = 'crosshair';
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        let rect = canvas.getBoundingClientRect();
        let mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        let mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        if (isDraggingCrop) {
            let newX = mouseX - dragStartX;
            let newY = mouseY - dragStartY;
            // Constrain within canvas
            newX = Math.max(0, Math.min(newX, canvas.width - cropRect.w));
            newY = Math.max(0, Math.min(newY, canvas.height - cropRect.h));
            cropRect.x = newX;
            cropRect.y = newY;
            drawCropOverlay();
        } else if (isDrawing) {
            // Draw temporary rectangle
            let w = mouseX - startX;
            let h = mouseY - startY;
            if (currentAspect) {
                // Maintain aspect ratio
                let aspect = currentAspect;
                if (Math.abs(w) > Math.abs(h)) {
                    h = w / aspect;
                } else {
                    w = h * aspect;
                }
            }
            // Ensure positive dimensions
            let x = startX, y = startY;
            if (w < 0) { x = startX + w; w = -w; }
            if (h < 0) { y = startY + h; h = -h; }
            // Limit to canvas bounds
            if (x < 0) { w += x; x = 0; }
            if (y < 0) { h += y; y = 0; }
            if (x + w > canvas.width) w = canvas.width - x;
            if (y + h > canvas.height) h = canvas.height - y;
            cropRect = { x, y, w, h };
            drawCropOverlay();
        }
    });

    canvas.addEventListener('mouseup', () => {
        isDrawing = false;
        isDraggingCrop = false;
        canvas.style.cursor = 'crosshair';
        // Ensure crop rect has minimum size
        if (cropRect.w < 10 || cropRect.h < 10) {
            cropRect.w = canvas.width * 0.8;
            cropRect.h = canvas.height * 0.8;
            cropRect.x = (canvas.width - cropRect.w) / 2;
            cropRect.y = (canvas.height - cropRect.h) / 2;
            drawCropOverlay();
        }
    });

    // Touch events for mobile
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        let rect = canvas.getBoundingClientRect();
        let touch = e.touches[0];
        let mouseX = (touch.clientX - rect.left) * (canvas.width / rect.width);
        let mouseY = (touch.clientY - rect.top) * (canvas.height / rect.height);
        if (mouseX >= cropRect.x && mouseX <= cropRect.x + cropRect.w &&
            mouseY >= cropRect.y && mouseY <= cropRect.y + cropRect.h) {
            isDraggingCrop = true;
            dragStartX = mouseX - cropRect.x;
            dragStartY = mouseY - cropRect.y;
        } else {
            isDrawing = true;
            startX = mouseX;
            startY = mouseY;
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        let rect = canvas.getBoundingClientRect();
        let touch = e.touches[0];
        let mouseX = (touch.clientX - rect.left) * (canvas.width / rect.width);
        let mouseY = (touch.clientY - rect.top) * (canvas.height / rect.height);
        if (isDraggingCrop) {
            let newX = mouseX - dragStartX;
            let newY = mouseY - dragStartY;
            newX = Math.max(0, Math.min(newX, canvas.width - cropRect.w));
            newY = Math.max(0, Math.min(newY, canvas.height - cropRect.h));
            cropRect.x = newX;
            cropRect.y = newY;
            drawCropOverlay();
        } else if (isDrawing) {
            let w = mouseX - startX;
            let h = mouseY - startY;
            if (currentAspect) {
                let aspect = currentAspect;
                if (Math.abs(w) > Math.abs(h)) {
                    h = w / aspect;
                } else {
                    w = h * aspect;
                }
            }
            let x = startX, y = startY;
            if (w < 0) { x = startX + w; w = -w; }
            if (h < 0) { y = startY + h; h = -h; }
            if (x < 0) { w += x; x = 0; }
            if (y < 0) { h += y; y = 0; }
            if (x + w > canvas.width) w = canvas.width - x;
            if (y + h > canvas.height) h = canvas.height - y;
            cropRect = { x, y, w, h };
            drawCropOverlay();
        }
    });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        isDrawing = false;
        isDraggingCrop = false;
        if (cropRect.w < 10 || cropRect.h < 10) {
            cropRect.w = canvas.width * 0.8;
            cropRect.h = canvas.height * 0.8;
            cropRect.x = (canvas.width - cropRect.w) / 2;
            cropRect.y = (canvas.height - cropRect.h) / 2;
            drawCropOverlay();
        }
    });

    // Aspect ratio buttons
    document.querySelectorAll('.aspect-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.aspect-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            let ratio = this.getAttribute('data-ratio');
            if (ratio === 'free') {
                currentAspect = null;
            } else {
                let [w, h] = ratio.split(':');
                currentAspect = parseFloat(w) / parseFloat(h);
            }
            // Reset crop rectangle to center with new aspect ratio
            let newW = Math.min(canvas.width * 0.8, canvas.width);
            let newH = newW / currentAspect;
            if (newH > canvas.height) {
                newH = canvas.height * 0.8;
                newW = newH * currentAspect;
            }
            cropRect = {
                x: (canvas.width - newW) / 2,
                y: (canvas.height - newH) / 2,
                w: newW,
                h: newH
            };
            drawCropOverlay();
        });
    });

    function applyCrop() {
        if (!originalFile) {
            showToast('Please upload an image first!', '#dc2626');
            return;
        }
        // Calculate actual crop coordinates on original image
        let scaleX = imageWidth / canvas.width;
        let scaleY = imageHeight / canvas.height;
        let actualX = cropRect.x * scaleX;
        let actualY = cropRect.y * scaleY;
        let actualW = cropRect.w * scaleX;
        let actualH = cropRect.h * scaleY;

        let cropCanvas = document.createElement('canvas');
        cropCanvas.width = actualW;
        cropCanvas.height = actualH;
        let cropCtx = cropCanvas.getContext('2d');
        cropCtx.drawImage(img, actualX, actualY, actualW, actualH, 0, 0, actualW, actualH);
        cropCanvas.toBlob(function(blob) {
            croppedBlob = blob;
            document.getElementById('downloadBtn').style.display = 'block';
            showToast('Cropped successfully! Click Download.', '#22c55e');
        }, originalFile.type);
    }

    function downloadCropped() {
        if (!croppedBlob) {
            showToast('Please apply crop first!', '#dc2626');
            return;
        }
        let link = document.createElement('a');
        let name = originalFile.name.split('.');
        let ext = name.pop();
        link.download = name.join('.') + '_cropped.' + ext;
        link.href = URL.createObjectURL(croppedBlob);
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('✅ Download started!', '#0D9488');
    }

    function clearAll() {
        document.getElementById('fileInput').value = '';
        document.getElementById('cropperContainer').classList.remove('show');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        originalFile = null;
        croppedBlob = null;
        showToast('Cleared!', '#dc2626');
    }

    function showToast(msg, bgColor) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bgColor;
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.fontSize = '14px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '1000';
        toast.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    document.getElementById('applyCropBtn').addEventListener('click', applyCrop);
    document.getElementById('downloadBtn').addEventListener('click', downloadCropped);

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        let btn = document.querySelector('.dark-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
            localStorage.setItem('darkMode', 'enabled');
        } else {
            btn.innerHTML = '🌙 Dark Mode';
            localStorage.setItem('darkMode', 'disabled');
        }
    }

    function loadDarkMode() {
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.querySelector('.dark-toggle').innerHTML = '☀️ Light Mode';
        }
    }

    window.onload = loadDarkMode;
</script>
</body>
</html>
