<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Image Resizer - Direct Download | Free Online Tools</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:linear-gradient(135deg,#1E3A8A 0%,#0D9488 100%);min-height:100vh;padding:16px;transition:all .3s ease;}
        body.dark-mode{background:linear-gradient(135deg,#0f172a 0%,#0f766e 100%);}
        .container{max-width:100%;margin:0 auto;}
        .card{background:white;border-radius:32px;padding:24px 20px 32px;box-shadow:0 25px 50px rgba(0,0,0,0.25);transition:all .3s ease;text-align:center;}
        body.dark-mode .card{background:#1e293b;}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
        h1{color:#1E3A8A;font-size:24px;}
        body.dark-mode h1{color:#0D9488;}
        .sub{color:#0D9488;font-size:12px;font-weight:500;}
        body.dark-mode .sub{color:#5eead4;}
        .dark-toggle{background:#f1f5f9;border:none;padding:10px 16px;border-radius:50px;font-size:14px;font-weight:bold;cursor:pointer;}
        body.dark-mode .dark-toggle{background:#334155;color:white;}
        .upload-area{border:2px dashed #0D9488;border-radius:24px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s ease;margin-bottom:24px;background:#f8fafc;}
        body.dark-mode .upload-area{background:#334155;border-color:#5eead4;}
        .upload-area:hover{background:#f0fdf4;border-color:#1E3A8A;}
        .upload-icon{font-size:48px;margin-bottom:12px;}
        .upload-text{color:#1E3A8A;font-weight:500;}
        body.dark-mode .upload-text{color:#5eead4;}
        .upload-hint{font-size:12px;color:#64748b;margin-top:8px;}
        .preview-section{display:none;margin-top:24px;}
        .preview-section.show{display:block;}
        .preview-img{width:100%;max-height:200px;object-fit:contain;border-radius:20px;margin-bottom:20px;background:#f8fafc;padding:10px;}
        body.dark-mode .preview-img{background:#334155;}
        .preset-section{background:#f8fafc;border-radius:20px;padding:16px;margin-bottom:20px;}
        body.dark-mode .preset-section{background:#334155;}
        .preset-title{font-weight:700;color:#1E3A8A;font-size:13px;margin-bottom:12px;text-align:left;}
        body.dark-mode .preset-title{color:#5eead4;}
        .preset-buttons{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
        .preset-btn{background:#e2e8f0;border:none;padding:10px 16px;border-radius:50px;font-size:13px;font-weight:600;color:#1E3A8A;cursor:pointer;transition:0.1s;}
        body.dark-mode .preset-btn{background:#475569;color:#5eead4;}
        .preset-btn:active{transform:scale(0.96);}
        .resize-controls{background:#f8fafc;border-radius:24px;padding:20px;margin:20px 0;}
        body.dark-mode .resize-controls{background:#334155;}
        .dimension-row{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px;}
        .dimension-box{flex:1;}
        .dimension-label{font-weight:700;color:#1E3A8A;margin-bottom:8px;font-size:13px;display:block;}
        body.dark-mode .dimension-label{color:#5eead4;}
        .dimension-input{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:16px;font-size:16px;text-align:center;background:white;}
        body.dark-mode .dimension-input{background:#1e293b;color:white;border-color:#0D9488;}
        .custom-download-btn{width:100%;background:linear-gradient(135deg,#1E3A8A 0%,#0D9488 100%);color:white;border:none;padding:14px;border-radius:50px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:15px;}
        .info-text{text-align:center;color:#0D9488;font-size:12px;background:#f0fdf4;padding:12px;border-radius:16px;margin-top:20px;}
        body.dark-mode .info-text{background:#0f766e;color:#ccfbf1;}
        @media (min-width:600px){body{padding:30px;}.container{max-width:700px;margin:0 auto;}}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div><h1>📐 Image Resizer</h1><p class="sub">Click any size → Image resizes & downloads instantly</p></div>
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">Click to upload an image</div>
            <div class="upload-hint">PNG, JPG, JPEG, WEBP (Max 10MB)</div>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
        </div>
        <div class="preview-section" id="previewSection">
            <img id="previewImg" class="preview-img" alt="Preview">
            <div class="preset-section">
                <div class="preset-title">⚡ Click any size to resize & download immediately</div>
                <div class="preset-buttons">
                    <button class="preset-btn" data-w="1920" data-h="1080">1920x1080 (HD)</button>
                    <button class="preset-btn" data-w="1280" data-h="720">1280x720 (720p)</button>
                    <button class="preset-btn" data-w="1080" data-h="1080">1080x1080 (Instagram)</button>
                    <button class="preset-btn" data-w="1080" data-h="1350">1080x1350 (IG Portrait)</button>
                    <button class="preset-btn" data-w="1200" data-h="628">1200x628 (Facebook)</button>
                    <button class="preset-btn" data-w="800" data-h="600">800x600 (Small)</button>
                    <button class="preset-btn" data-w="640" data-h="480">640x480 (Old TV)</button>
                    <button class="preset-btn" data-w="500" data-h="500">500x500 (Square)</button>
                    <button class="preset-btn" data-w="300" data-h="250">300x250 (Ad)</button>
                    <button class="preset-btn" data-w="150" data-h="150">150x150 (Thumbnail)</button>
                </div>
            </div>
            <div class="resize-controls">
                <div class="dimension-row">
                    <div class="dimension-box"><label class="dimension-label">📏 Custom Width (px)</label><input type="number" id="customWidth" class="dimension-input" placeholder="Width"></div>
                    <div class="dimension-box"><label class="dimension-label">📐 Custom Height (px)</label><input type="number" id="customHeight" class="dimension-input" placeholder="Height"></div>
                </div>
                <button class="custom-download-btn" id="customDownloadBtn">⬇️ Resize & Download Custom Size</button>
            </div>
        </div>
        <div class="info-text">💡 Upload image → Click any preset size (or enter custom) → Image downloads automatically!</div>
    </div>
</div>
<script>
    let originalFile=null, originalURL=null, originalImgObj=null;

    function handleImageUpload(e){
        let file=e.target.files[0];
        if(!file) return;
        if(!file.type.startsWith('image/')){showToast('Please upload an image!','#dc2626'); return;}
        if(file.size>10*1024*1024){showToast('Max 10MB','#dc2626'); return;}
        originalFile=file;
        if(originalURL) URL.revokeObjectURL(originalURL);
        originalURL=URL.createObjectURL(file);
        let img=document.getElementById('previewImg');
        img.src=originalURL;
        img.onload=function(){
            originalImgObj=img;
            document.getElementById('previewSection').classList.add('show');
            showToast('Image loaded! Click any size to download.','#0D9488');
        };
        img.onerror=function(){showToast('Error loading image','#dc2626');};
    }

    function resizeAndDownload(targetW, targetH){
        if(!originalFile){showToast('Please upload an image first!','#dc2626'); return;}
        let img=new Image();
        img.src=originalURL;
        img.onload=function(){
            let canvas=document.createElement('canvas');
            canvas.width=targetW;
            canvas.height=targetH;
            let ctx=canvas.getContext('2d');
            ctx.drawImage(img,0,0,targetW,targetH);
            canvas.toBlob(function(blob){
                let link=document.createElement('a');
                let name=originalFile.name.split('.');
                let ext=name.pop();
                link.download=name.join('.')+'_'+targetW+'x'+targetH+'.'+ext;
                link.href=URL.createObjectURL(blob);
                link.click();
                URL.revokeObjectURL(link.href);
                showToast(`Downloaded ${targetW}x${targetH}`,'#22c55e');
            }, originalFile.type);
        };
        img.onerror=function(){showToast('Error processing image','#dc2626');};
    }

    // Preset buttons: attach event listeners after DOM ready
    document.querySelectorAll('.preset-btn').forEach(btn=>{
        btn.addEventListener('click',function(){
            let w=parseInt(this.getAttribute('data-w'));
            let h=parseInt(this.getAttribute('data-h'));
            if(!isNaN(w) && !isNaN(h)) resizeAndDownload(w,h);
            else showToast('Invalid size','#dc2626');
        });
    });

    // Custom size button
    document.getElementById('customDownloadBtn')?.addEventListener('click',function(){
        let w=parseInt(document.getElementById('customWidth').value);
        let h=parseInt(document.getElementById('customHeight').value);
        if(isNaN(w) || w<=0 || isNaN(h) || h<=0){
            showToast('Enter valid width and height (positive numbers)','#dc2626');
            return;
        }
        resizeAndDownload(w,h);
    });

    function showToast(msg,bg){
        let t=document.createElement('div');
        t.innerText=msg;
        t.style.position='fixed'; t.style.bottom='30px'; t.style.left='50%'; t.style.transform='translateX(-50%)';
        t.style.backgroundColor=bg; t.style.color='white'; t.style.padding='12px 24px'; t.style.borderRadius='50px';
        t.style.fontSize='14px'; t.style.fontWeight='bold'; t.style.zIndex='1000'; t.style.boxShadow='0 5px 15px rgba(0,0,0,0.2)';
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),2000);
    }

    function toggleDarkMode(){
        document.body.classList.toggle('dark-mode');
        let btn=document.querySelector('.dark-toggle');
        if(document.body.classList.contains('dark-mode')){btn.innerHTML='☀️ Light Mode'; localStorage.setItem('darkMode','enabled');}
        else{btn.innerHTML='🌙 Dark Mode'; localStorage.setItem('darkMode','disabled');}
    }
    function loadDarkMode(){if(localStorage.getItem('darkMode')==='enabled'){document.body.classList.add('dark-mode');document.querySelector('.dark-toggle').innerHTML='☀️ Light Mode';}}
    window.onload=loadDarkMode;
</script>
</body>
</html>
