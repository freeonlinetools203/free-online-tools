<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PDF to JPG - Convert PDF to Images | Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #0f766e 100%);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            text-align: center;
        }

        body.dark-mode .card {
            background: #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #1E3A8A;
            font-size: 24px;
        }

        body.dark-mode h1 {
            color: #0D9488;
        }

        .sub {
            color: #0D9488;
            font-size: 12px;
            font-weight: 500;
        }

        body.dark-mode .sub {
            color: #5eead4;
        }

        .dark-toggle {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .dark-toggle {
            background: #334155;
            color: white;
        }

        .upload-area {
            border: 2px dashed #0D9488;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            background: #f8fafc;
        }

        body.dark-mode .upload-area {
            background: #334155;
            border-color: #5eead4;
        }

        .upload-area:hover {
            background: #f0fdf4;
            border-color: #1E3A8A;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: #1E3A8A;
            font-weight: 500;
        }

        body.dark-mode .upload-text {
            color: #5eead4;
        }

        .upload-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }

        .settings-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        body.dark-mode .settings-section {
            background: #334155;
        }

        .settings-title {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 12px;
            font-size: 14px;
        }

        body.dark-mode .settings-title {
            color: #5eead4;
        }

        .setting-row {
            margin-bottom: 15px;
        }

        .setting-row label {
            display: block;
            font-weight: 600;
            color: #1E3A8A;
            font-size: 13px;
            margin-bottom: 8px;
        }

        body.dark-mode .setting-row label {
            color: #5eead4;
        }

        .setting-row select, .setting-row input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            font-size: 14px;
        }

        body.dark-mode .setting-row select, body.dark-mode .setting-row input {
            background: #1e293b;
            color: white;
            border-color: #0D9488;
        }

        .preview-section {
            display: none;
            margin-top: 20px;
        }

        .preview-section.show {
            display: block;
        }

        .page-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        .page-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            width: 120px;
        }

        body.dark-mode .page-item {
            background: #334155;
        }

        .page-item img {
            width: 100px;
            height: 130px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .page-number {
            font-size: 12px;
            font-weight: bold;
            color: #1E3A8A;
        }

        body.dark-mode .page-number {
            color: #5eead4;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            background: #0D9488;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn.convert {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
        }

        .action-btn.download {
            background: #22c55e;
        }

        .action-btn.clear {
            background: #dc2626;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loader.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #0D9488;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
        }

        body.dark-mode .info-text {
            background: #0f766e;
            color: #ccfbf1;
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 700px; margin: 0 auto; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div><h1>🖼️ PDF to JPG</h1><p class="sub">Convert PDF pages to JPG images</p></div>
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📑</div>
            <div class="upload-text">Click to upload PDF file</div>
            <div class="upload-hint">PDF only (Max 10MB)</div>
            <input type="file" id="fileInput" accept="application/pdf" style="display:none" onchange="handlePDFUpload(event)">
        </div>

        <div class="settings-section">
            <div class="settings-title">⚙️ Conversion Settings</div>
            <div class="setting-row">
                <label>📐 Image Quality (DPI)</label>
                <select id="quality">
                    <option value="1">Low (72 DPI - Small file)</option>
                    <option value="1.5" selected>Medium (108 DPI - Recommended)</option>
                    <option value="2">High (144 DPI - Large file)</option>
                    <option value="3">Best (216 DPI - Very large)</option>
                </select>
            </div>
            <div class="setting-row">
                <label>🎨 Image Format</label>
                <select id="format">
                    <option value="jpg">JPEG (Smaller file)</option>
                    <option value="png">PNG (Better quality)</option>
                </select>
            </div>
        </div>

        <div class="preview-section" id="previewSection">
            <div class="settings-title">📸 Generated Images</div>
            <div class="page-list" id="pageList"></div>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Converting PDF to images...</p>
        </div>

        <div class="action-buttons">
            <button class="action-btn convert" id="convertBtn" onclick="convertPDF()">🔄 Convert to Images</button>
            <button class="action-btn download" id="downloadBtn" style="display:none;" onclick="downloadAll()">📦 Download All as ZIP</button>
            <button class="action-btn clear" onclick="clearAll()">🗑️ Clear</button>
        </div>

        <div class="info-text">
            💡 Convert PDF pages to high-quality JPG or PNG images. Perfect for sharing, presentations, or archiving.
        </div>
    </div>
</div>

<script>
    let pdfDoc = null;
    let pdfFile = null;
    let renderedImages = [];

    function handlePDFUpload(event) {
        let file = event.target.files[0];
        if (!file) return;
        if (file.type !== 'application/pdf') {
            showToast('Please upload a PDF file!', '#dc2626');
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            showToast('File too large! Max 10MB', '#dc2626');
            return;
        }
        pdfFile = file;
        let reader = new FileReader();
        reader.onload = function(e) {
            let typedarray = new Uint8Array(e.target.result);
            pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                pdfDoc = pdf;
                showToast(`PDF loaded! ${pdf.numPages} pages. Click Convert.`, '#0D9488');
            }).catch(function(err) {
                showToast('Error loading PDF. File may be corrupted.', '#dc2626');
            });
        };
        reader.readAsArrayBuffer(file);
    }

    async function convertPDF() {
        if (!pdfDoc) {
            showToast('Please upload a PDF file first!', '#dc2626');
            return;
        }

        let loader = document.getElementById('loader');
        let convertBtn = document.getElementById('convertBtn');
        loader.classList.add('show');
        convertBtn.disabled = true;
        convertBtn.innerText = '⏳ Converting...';
        renderedImages = [];

        let quality = parseFloat(document.getElementById('quality').value);
        let format = document.getElementById('format').value;

        for (let i = 1; i <= pdfDoc.numPages; i++) {
            let page = await pdfDoc.getPage(i);
            let viewport = page.getViewport({ scale: quality });
            let canvas = document.createElement('canvas');
            let context = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            
            let mimeType = format === 'jpg' ? 'image/jpeg' : 'image/png';
            let blob = await new Promise(resolve => canvas.toBlob(resolve, mimeType, 0.9));
            let url = URL.createObjectURL(blob);
            renderedImages.push({ blob, url, pageNum: i });
        }

        displayImages();
        loader.classList.remove('show');
        convertBtn.disabled = false;
        convertBtn.innerText = '🔄 Convert to Images';
        document.getElementById('downloadBtn').style.display = 'block';
        showToast(`Converted ${pdfDoc.numPages} pages!`, '#22c55e');
    }

    function displayImages() {
        let container = document.getElementById('pageList');
        container.innerHTML = '';
        document.getElementById('previewSection').classList.add('show');
        
        for (let img of renderedImages) {
            let div = document.createElement('div');
            div.className = 'page-item';
            div.innerHTML = `
                <img src="${img.url}" alt="Page ${img.pageNum}">
                <div class="page-number">Page ${img.pageNum}</div>
            `;
            div.onclick = () => downloadSingle(img);
            container.appendChild(div);
        }
    }

    function downloadSingle(img) {
        let link = document.createElement('a');
        let format = document.getElementById('format').value;
        link.download = `page_${img.pageNum}.${format}`;
        link.href = img.url;
        link.click();
        showToast(`Downloaded page ${img.pageNum}`, '#0D9488');
    }

    function downloadAll() {
        if (renderedImages.length === 0) return;
        
        let script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        script.onload = function() {
            let zip = new JSZip();
            let format = document.getElementById('format').value;
            for (let img of renderedImages) {
                let fileName = `page_${img.pageNum}.${format}`;
                zip.file(fileName, img.blob);
            }
            zip.generateAsync({ type: 'blob' }).then(function(content) {
                let link = document.createElement('a');
                let pdfName = pdfFile.name.replace('.pdf', '');
                link.download = `${pdfName}_images.zip`;
                link.href = URL.createObjectURL(content);
                link.click();
                showToast('✅ ZIP downloaded!', '#22c55e');
            });
        };
        document.head.appendChild(script);
        showToast('Creating ZIP...', '#0D9488');
    }

    function clearAll() {
        pdfDoc = null;
        pdfFile = null;
        renderedImages = [];
        document.getElementById('fileInput').value = '';
        document.getElementById('previewSection').classList.remove('show');
        document.getElementById('downloadBtn').style.display = 'none';
        showToast('Cleared!', '#dc2626');
    }

    function showToast(msg, bgColor) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bgColor;
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.fontSize = '14px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '1000';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        let btn = document.querySelector('.dark-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
            localStorage.setItem('darkMode', 'enabled');
        } else {
            btn.innerHTML = '🌙 Dark Mode';
            localStorage.setItem('darkMode', 'disabled');
        }
    }

    function loadDarkMode() {
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.querySelector('.dark-toggle').innerHTML = '☀️ Light Mode';
        }
    }

    window.onload = loadDarkMode;
</script>
</body>
</html>
