<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Image to PDF - Convert Images to PDF | Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #0f766e 100%);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            text-align: center;
        }

        body.dark-mode .card {
            background: #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #1E3A8A;
            font-size: 24px;
        }

        body.dark-mode h1 {
            color: #0D9488;
        }

        .sub {
            color: #0D9488;
            font-size: 12px;
            font-weight: 500;
        }

        body.dark-mode .sub {
            color: #5eead4;
        }

        .dark-toggle {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .dark-toggle {
            background: #334155;
            color: white;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #0D9488;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            background: #f8fafc;
        }

        body.dark-mode .upload-area {
            background: #334155;
            border-color: #5eead4;
        }

        .upload-area:hover {
            background: #f0fdf4;
            border-color: #1E3A8A;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: #1E3A8A;
            font-weight: 500;
        }

        body.dark-mode .upload-text {
            color: #5eead4;
        }

        .upload-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }

        /* Image List */
        .images-section {
            display: none;
            margin-top: 24px;
        }

        .images-section.show {
            display: block;
        }

        .images-title {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: left;
        }

        body.dark-mode .images-title {
            color: #5eead4;
        }

        .image-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }

        .image-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
            transition: 0.2s;
        }

        body.dark-mode .image-item {
            background: #334155;
        }

        .image-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
        }

        .image-info {
            flex: 1;
            text-align: left;
        }

        .image-name {
            font-size: 13px;
            font-weight: 500;
            color: #1E3A8A;
            word-break: break-all;
        }

        body.dark-mode .image-name {
            color: #5eead4;
        }

        .image-size {
            font-size: 11px;
            color: #64748b;
        }

        .remove-image {
            background: #dc2626;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Settings */
        .settings {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: left;
        }

        body.dark-mode .settings {
            background: #334155;
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .setting-label {
            font-weight: 600;
            color: #1E3A8A;
            font-size: 13px;
        }

        body.dark-mode .setting-label {
            color: #5eead4;
        }

        select, input {
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            font-size: 13px;
        }

        body.dark-mode select, body.dark-mode input {
            background: #1e293b;
            color: white;
            border-color: #0D9488;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            background: #0D9488;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn.convert {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
        }

        .action-btn.clear {
            background: #dc2626;
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
        }

        body.dark-mode .info-text {
            background: #0f766e;
            color: #ccfbf1;
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 700px; margin: 0 auto; }
        }
    </style>
    <!-- Include jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div><h1>📄 Image to PDF</h1><p class="sub">Convert multiple images to PDF</p></div>
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>

        <!-- Upload Area -->
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">Click to upload images</div>
            <div class="upload-hint">PNG, JPG, JPEG, WEBP (Max 10MB each, multiple allowed)</div>
            <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleImageUpload(event)">
        </div>

        <!-- Image List -->
        <div class="images-section" id="imagesSection">
            <div class="images-title">📸 Selected Images (<span id="imageCount">0</span>)</div>
            <div class="image-list" id="imageList"></div>

            <div class="settings">
                <div class="setting-row">
                    <span class="setting-label">📄 Page Size:</span>
                    <select id="pageSize">
                        <option value="a4">A4 (210x297mm)</option>
                        <option value="letter">Letter (8.5x11in)</option>
                        <option value="legal">Legal (8.5x14in)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-label">📐 Image Fit:</span>
                    <select id="fitMode">
                        <option value="fit">Fit to page (maintain aspect)</option>
                        <option value="fill">Fill page (may crop)</option>
                        <option value="original">Original size</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-label">🖼️ Orientation:</span>
                    <select id="orientation">
                        <option value="portrait">Portrait</option>
                        <option value="landscape">Landscape</option>
                    </select>
                </div>
            </div>

            <div class="action-buttons">
                <button class="action-btn convert" id="convertBtn">📄 Convert to PDF</button>
                <button class="action-btn clear" onclick="clearAll()">🗑️ Clear All</button>
            </div>
        </div>

        <div class="info-text">
            💡 Upload one or more images → Adjust page settings → Convert to PDF and download!
        </div>
    </div>
</div>

<script>
    let images = []; // store {file, dataURL, width, height}

    function handleImageUpload(event) {
        let files = Array.from(event.target.files);
        if (files.length === 0) return;

        for (let file of files) {
            if (!file.type.startsWith('image/')) {
                showToast(`Skipping non-image: ${file.name}`, '#dc2626');
                continue;
            }
            if (file.size > 10 * 1024 * 1024) {
                showToast(`Skipping large file (>10MB): ${file.name}`, '#dc2626');
                continue;
            }
            let reader = new FileReader();
            reader.onload = function(e) {
                let img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    images.push({
                        file: file,
                        dataURL: e.target.result,
                        width: img.width,
                        height: img.height,
                        name: file.name
                    });
                    renderImageList();
                    document.getElementById('imagesSection').classList.add('show');
                };
            };
            reader.readAsDataURL(file);
        }
    }

    function renderImageList() {
        let container = document.getElementById('imageList');
        container.innerHTML = '';
        document.getElementById('imageCount').innerText = images.length;

        images.forEach((img, index) => {
            let div = document.createElement('div');
            div.className = 'image-item';
            div.innerHTML = `
                <img src="${img.dataURL}" alt="preview">
                <div class="image-info">
                    <div class="image-name">${img.name.length > 30 ? img.name.substring(0,27)+'...' : img.name}</div>
                    <div class="image-size">${formatFileSize(img.file.size)} • ${img.width}x${img.height}</div>
                </div>
                <button class="remove-image" onclick="removeImage(${index})">✕</button>
            `;
            container.appendChild(div);
        });
    }

    function removeImage(index) {
        images.splice(index, 1);
        renderImageList();
        if (images.length === 0) {
            document.getElementById('imagesSection').classList.remove('show');
        }
        showToast('Image removed', '#dc2626');
    }

    function clearAll() {
        images = [];
        document.getElementById('fileInput').value = '';
        document.getElementById('imagesSection').classList.remove('show');
        renderImageList();
        showToast('All cleared', '#dc2626');
    }

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function convertToPDF() {
        if (images.length === 0) {
            showToast('Please add at least one image!', '#dc2626');
            return;
        }

        showToast('Generating PDF...', '#0D9488');
        document.getElementById('convertBtn').disabled = true;
        document.getElementById('convertBtn').innerHTML = '⏳ Generating...';

        try {
            const { jsPDF } = window.jspdf;
            let pageSize = document.getElementById('pageSize').value;
            let fitMode = document.getElementById('fitMode').value;
            let orientation = document.getElementById('orientation').value;

            // Page dimensions in mm
            let pageWidth, pageHeight;
            if (pageSize === 'a4') {
                pageWidth = 210;
                pageHeight = 297;
            } else if (pageSize === 'letter') {
                pageWidth = 215.9;
                pageHeight = 279.4;
            } else {
                pageWidth = 215.9;
                pageHeight = 355.6;
            }

            if (orientation === 'landscape') {
                [pageWidth, pageHeight] = [pageHeight, pageWidth];
            }

            let pdf = new jsPDF({
                unit: 'mm',
                format: [pageWidth, pageHeight],
                orientation: orientation
            });

            for (let i = 0; i < images.length; i++) {
                let img = images[i];
                let imgWidthMm = img.width;
                let imgHeightMm = img.height;
                // We need to get actual image dimensions in mm at 72 DPI? jsPDF uses mm.
                // Load image into canvas to get dimensions at 72 DPI conversion.
                let imgElement = new Image();
                imgElement.src = img.dataURL;
                await new Promise((resolve) => {
                    imgElement.onload = resolve;
                });
                
                let canvas = document.createElement('canvas');
                canvas.width = imgElement.width;
                canvas.height = imgElement.height;
                let ctx = canvas.getContext('2d');
                ctx.drawImage(imgElement, 0, 0);
                
                let imgData = canvas.toDataURL('image/jpeg', 0.95);
                
                let pdfWidth, pdfHeight;
                if (fitMode === 'fit') {
                    // Fit to page, maintain aspect
                    let ratio = Math.min(pageWidth / imgElement.width, pageHeight / imgElement.height);
                    pdfWidth = imgElement.width * ratio;
                    pdfHeight = imgElement.height * ratio;
                } else if (fitMode === 'fill') {
                    pdfWidth = pageWidth;
                    pdfHeight = pageHeight;
                } else {
                    // original size: convert px to mm at 96 DPI (1 inch = 25.4mm, 96px per inch)
                    let pxToMm = 25.4 / 96;
                    pdfWidth = imgElement.width * pxToMm;
                    pdfHeight = imgElement.height * pxToMm;
                    if (pdfWidth > pageWidth || pdfHeight > pageHeight) {
                        // scale down to fit page if too large
                        let ratio = Math.min(pageWidth / pdfWidth, pageHeight / pdfHeight);
                        pdfWidth *= ratio;
                        pdfHeight *= ratio;
                    }
                }
                
                let x = (pageWidth - pdfWidth) / 2;
                let y = (pageHeight - pdfHeight) / 2;
                
                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', x, y, pdfWidth, pdfHeight, undefined, 'FAST');
            }
            
            pdf.save('converted_images.pdf');
            showToast('✅ PDF downloaded!', '#22c55e');
        } catch (error) {
            console.error(error);
            showToast('Error generating PDF. Try fewer images.', '#dc2626');
        } finally {
            document.getElementById('convertBtn').disabled = false;
            document.getElementById('convertBtn').innerHTML = '📄 Convert to PDF';
        }
    }

    function showToast(msg, bgColor) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bgColor;
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.fontSize = '14px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '1000';
        toast.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        let btn = document.querySelector('.dark-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
            localStorage.setItem('darkMode', 'enabled');
        } else {
            btn.innerHTML = '🌙 Dark Mode';
            localStorage.setItem('darkMode', 'disabled');
        }
    }

    function loadDarkMode() {
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.querySelector('.dark-toggle').innerHTML = '☀️ Light Mode';
        }
    }

    document.getElementById('convertBtn').addEventListener('click', convertToPDF);

    window.onload = loadDarkMode;
</script>
</body>
</html>
