<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Spinning Color Wheel - Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #0f766e 100%);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        body.dark-mode .card {
            background: #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #1E3A8A;
            font-size: 24px;
        }

        body.dark-mode h1 {
            color: #0D9488;
        }

        .sub {
            color: #0D9488;
            font-size: 12px;
            font-weight: 500;
        }

        body.dark-mode .sub {
            color: #5eead4;
        }

        .dark-toggle {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .dark-toggle {
            background: #334155;
            color: white;
        }

        .wheel-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .wheel {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #dc2626;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            z-index: 10;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }

        .spin-btn {
            width: 100%;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .spin-btn:active {
            transform: scale(0.98);
        }

        .result-card {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .selected-color {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 15px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .color-code {
            font-size: 20px;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
            margin: 10px 0;
        }

        .color-name {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 15px;
        }

        .copy-buttons {
            display: flex;
            gap: 12px;
        }

        .copy-btn {
            flex: 1;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:active {
            transform: scale(0.97);
        }

        .history-section {
            margin-top: 20px;
        }

        .history-title {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        body.dark-mode .history-title {
            color: #0D9488;
        }

        .history-colors {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .history-item {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .history-item:active {
            transform: scale(0.95);
        }

        .clear-history {
            background: none;
            border: none;
            color: #dc2626;
            font-size: 12px;
            cursor: pointer;
            margin-left: auto;
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
        }

        body.dark-mode .info-text {
            background: #0f766e;
            color: #ccfbf1;
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 550px; margin: 0 auto; }
            .wheel { width: 320px; height: 320px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div>
                    <h1>🎡 Spinning Color Wheel</h1>
                    <p class="sub">Spin & pick your lucky color!</p>
                </div>
                <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
            </div>

            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <canvas id="colorWheel" class="wheel" width="500" height="500"></canvas>
            </div>

            <button class="spin-btn" onclick="spinWheel()">🎡 SPIN THE WHEEL</button>

            <div class="result-card" id="resultCard">
                <div class="selected-color" id="selectedColorBox"></div>
                <div class="color-code" id="selectedColorHex">#FF0000</div>
                <div class="color-name" id="colorName">Red</div>
                <div class="copy-buttons">
                    <button class="copy-btn" onclick="copyHex()">📋 Copy HEX</button>
                    <button class="copy-btn" onclick="copyRGB()">📋 Copy RGB</button>
                </div>
            </div>

            <div class="history-section">
                <div class="history-title">
                    📜 Color History
                    <button class="clear-history" onclick="clearHistory()">Clear All</button>
                </div>
                <div class="history-colors" id="historyColors"></div>
            </div>

            <div class="info-text">
                💡 Click SPIN — wheel spins and stops at a random color! Click history colors to reuse.
            </div>
        </div>
    </div>

    <script>
        const colors = [
            '#FF0000', '#FF2000', '#FF4000', '#FF6000', '#FF8000', '#FFA000',
            '#FFC000', '#FFE000', '#FFFF00', '#C0FF00', '#80FF00', '#40FF00',
            '#00FF00', '#00FF40', '#00FF80', '#00FFC0', '#00FFFF', '#00C0FF',
            '#0080FF', '#0040FF', '#0000FF', '#4000FF', '#8000FF', '#C000FF'
        ];

        const colorNames = [
            'Pure Red', 'Red Orange', 'Orange Red', 'Deep Orange', 'Orange', 'Golden Orange',
            'Yellow Orange', 'Golden', 'Sun Yellow', 'Lime Green', 'Light Green', 'Green Yellow',
            'Pure Green', 'Sea Green', 'Medium Green', 'Teal Green', 'Cyan', 'Sky Blue',
            'Dodger Blue', 'Royal Blue', 'Pure Blue', 'Purple Blue', 'Violet', 'Magenta'
        ];

        let canvas = document.getElementById('colorWheel');
        let ctx = canvas.getContext('2d');
        let spinning = false;
        let currentAngle = 0;
        let spinStartTime = 0;
        let spinDuration = 2000;
        let spinEndAngle = 0;
        let selectedColor = '#FF0000';
        let selectedColorName = 'Pure Red';
        let colorHistory = [];

        function loadHistory() {
            let saved = localStorage.getItem('colorWheelHistory');
            if (saved) {
                colorHistory = JSON.parse(saved);
                renderHistory();
            }
        }

        function saveHistory() {
            localStorage.setItem('colorWheelHistory', JSON.stringify(colorHistory));
        }

        function addToHistory(color, name) {
            colorHistory = colorHistory.filter(c => c.color !== color);
            colorHistory.unshift({ color: color, name: name });
            if (colorHistory.length > 8) colorHistory.pop();
            saveHistory();
            renderHistory();
        }

        function renderHistory() {
            let container = document.getElementById('historyColors');
            container.innerHTML = '';
            colorHistory.forEach(item => {
                let div = document.createElement('div');
                div.className = 'history-item';
                div.style.backgroundColor = item.color;
                div.title = item.name;
                div.onclick = () => setSelectedColor(item.color, item.name);
                container.appendChild(div);
            });
        }

        function clearHistory() {
            colorHistory = [];
            saveHistory();
            renderHistory();
            showFeedback('History cleared!', '#dc2626');
        }

        function setSelectedColor(color, name) {
            selectedColor = color;
            selectedColorName = name;
            document.getElementById('selectedColorBox').style.backgroundColor = color;
            document.getElementById('selectedColorHex').innerHTML = color.toUpperCase();
            document.getElementById('colorName').innerHTML = name;
            
            let resultCard = document.getElementById('resultCard');
            resultCard.style.background = `linear-gradient(135deg, ${color} 0%, ${adjustColor(color, -30)} 100%)`;
            
            addToHistory(color, name);
        }

        function adjustColor(hex, percent) {
            let r = parseInt(hex.slice(1,3), 16);
            let g = parseInt(hex.slice(3,5), 16);
            let b = parseInt(hex.slice(5,7), 16);
            r = Math.min(255, Math.max(0, r + (r * percent / 100)));
            g = Math.min(255, Math.max(0, g + (g * percent / 100)));
            b = Math.min(255, Math.max(0, b + (b * percent / 100)));
            return '#' + Math.floor(r).toString(16).padStart(2,'0') + Math.floor(g).toString(16).padStart(2,'0') + Math.floor(b).toString(16).padStart(2,'0');
        }

        function resizeCanvas() {
            let size = window.innerWidth < 600 ? 260 : 320;
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            drawWheel(currentAngle);
        }

        function drawWheel(angle) {
            let size = canvas.width;
            let centerX = size / 2;
            let centerY = size / 2;
            let radius = size / 2;
            let angleStep = (Math.PI * 2) / colors.length;

            ctx.clearRect(0, 0, size, size);

            for (let i = 0; i < colors.length; i++) {
                let startAngle = i * angleStep + angle;
                let endAngle = (i + 1) * angleStep + angle;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i];
                ctx.fill();
                
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX, centerY);
                ctx.stroke();
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = '#1E3A8A';
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function getColorAtPointer() {
            let pointerAngle = -Math.PI / 2;
            let actualAngle = pointerAngle - currentAngle;
            while (actualAngle < 0) actualAngle += Math.PI * 2;
            while (actualAngle >= Math.PI * 2) actualAngle -= Math.PI * 2;
            let angleStep = (Math.PI * 2) / colors.length;
            let index = Math.floor(actualAngle / angleStep);
            index = Math.min(index, colors.length - 1);
            return { color: colors[index], name: colorNames[index] };
        }

        function spinWheel() {
            if (spinning) return;
            spinning = true;
            spinStartTime = performance.now();
            let fullRotations = 5 + Math.random() * 5;
            let finalAngleOffset = Math.random() * Math.PI * 2;
            spinEndAngle = currentAngle + (fullRotations * Math.PI * 2) + finalAngleOffset;
            if (navigator.vibrate) navigator.vibrate(50);
            animateSpin(spinStartTime);
        }

        function animateSpin(now) {
            let elapsed = performance.now() - now;
            let t = Math.min(1, elapsed / spinDuration);
            let easeOut = 1 - Math.pow(1 - t, 3);
            let newAngle = currentAngle + (spinEndAngle - currentAngle) * easeOut;
            currentAngle = newAngle % (Math.PI * 2);
            drawWheel(currentAngle);
            
            if (t < 1) {
                requestAnimationFrame(() => animateSpin(now));
            } else {
                spinning = false;
                let result = getColorAtPointer();
                setSelectedColor(result.color, result.name);
                if (navigator.vibrate) navigator.vibrate(100);
                let resultCard = document.getElementById('resultCard');
                resultCard.style.transform = 'scale(1.02)';
                setTimeout(() => { resultCard.style.transform = 'scale(1)'; }, 200);
                showFeedback('Got ' + result.name + '!', result.color);
            }
        }

        function showFeedback(msg, bgColor) {
            let feedback = document.createElement('div');
            feedback.innerText = msg;
            feedback.style.position = 'fixed';
            feedback.style.bottom = '30px';
            feedback.style.left = '50%';
            feedback.style.transform = 'translateX(-50%)';
            feedback.style.backgroundColor = bgColor;
            feedback.style.color = 'white';
            feedback.style.padding = '12px 24px';
            feedback.style.borderRadius = '50px';
            feedback.style.fontSize = '14px';
            feedback.style.zIndex = '1000';
            feedback.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
            document.body.appendChild(feedback);
            setTimeout(() => { feedback.remove(); }, 2000);
        }

        function copyHex() {
            navigator.clipboard.writeText(selectedColor.toUpperCase());
            showFeedback('HEX copied: ' + selectedColor.toUpperCase(), '#0D9488');
        }

        function copyRGB() {
            let r = parseInt(selectedColor.slice(1,3), 16);
            let g = parseInt(selectedColor.slice(3,5), 16);
            let b = parseInt(selectedColor.slice(5,7), 16);
            let rgb = 'rgb(' + r + ', ' + g + ', ' + b + ')';
            navigator.clipboard.writeText(rgb);
            showFeedback('RGB copied: ' + rgb, '#0D9488');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            let btn = document.querySelector('.dark-toggle');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = '☀️ Light Mode';
                localStorage.setItem('darkMode', 'enabled');
            } else {
                btn.innerHTML = '🌙 Dark Mode';
                localStorage.setItem('darkMode', 'disabled');
            }
        }

        function loadDarkMode() {
            let darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.body.classList.add('dark-mode');
                document.querySelector('.dark-toggle').innerHTML = '☀️ Light Mode';
            }
        }

        window.addEventListener('resize', function() { resizeCanvas(); });

        window.onload = function() {
            resizeCanvas();
            loadHistory();
            loadDarkMode();
            setSelectedColor('#FF0000', 'Pure Red');
        };
    </script>
</body>
</html>
